<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>遊戲選單</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <h1 id="gameTitle">踩地雷</h1>

    <div class="controls game-selector">
      <label for="gameSelect">選擇遊戲：</label>
      <select id="gameSelect">
        <option value="minesweeper">踩地雷</option>
        <option value="galaxian">Galaxian 小蜜蜂</option>
      </select>
    </div>

    <section id="gamePanelMinesweeper" class="game-panel">
      <div class="controls">
        <label>
          大小：
          <select id="sizePicker">
            <option value="9">9x9</option>
            <option value="12">12x12</option>
            <option value="15">15x15</option>
          </select>
        </label>
        <label>
          地雷：
          <select id="minePicker">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="35">35</option>
          </select>
        </label>
        <button id="restartButton">重新開始</button>
      </div>

      <div class="status-bar">
        <span>剩餘地雷：<strong id="remainingMines">0</strong></span>
        <span>狀態：<strong id="gameStatus">尚未開始</strong></span>
      </div>

      <div id="board" class="board"></div>
    </section>

    <section id="gamePanelGalaxian" class="game-panel" style="display: none;">
      <div class="controls">
        <button id="galaxianStartButton">開始 Galaxian</button>
        <span>得分：<strong id="galaxianScore">0</strong></span>
        <span>生命：<strong id="galaxianLives">3</strong></span>
      </div>

      <div class="status-bar">
        <span id="galaxianStatus">準備中</span>
      </div>

      <div id="galaxianBoard" class="board galaxian-board"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
